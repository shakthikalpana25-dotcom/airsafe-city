<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Plan - AirSafe City</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    
    body { background: #0a0e1a; color: #e0e0e0; }

    nav {
      background: #0d1117;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1a73e8;
    }
    .logo { color: #1a73e8; font-size: 20px; font-weight: bold; text-decoration: none; }
    .nav-links a { color: #aaa; text-decoration: none; margin-left: 15px; font-size: 14px; }
    .nav-links a:hover { color: #1a73e8; }

    .page-header {
      background: linear-gradient(135deg, #0d1117, #0a1628);
      border-bottom: 1px solid #1a73e8;
      text-align: center;
      padding: 40px 20px;
    }
    .page-header h1 { font-size: 28px; color: #1a73e8; margin-bottom: 8px; }
    .page-header p { color: #888; font-size: 14px; }

    .highlight-badge {
      display: inline-block;
      background: #1a73e8;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .section {
      background: #0d1117;
      margin: 20px;
      border-radius: 15px;
      padding: 25px;
      border: 1px solid #1a2535;
    }

    .section h2 {
      color: #1a73e8;
      margin-bottom: 20px;
      font-size: 18px;
    }

    .form-group { margin-bottom: 15px; }
    .form-group label {
      display: block;
      color: #aaa;
      font-size: 13px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 15px;
      background: #0a0e1a;
      border: 1px solid #1a2535;
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: #1a73e8;
    }

    .form-group select option { background: #0d1117; }

    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 5px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #0a0e1a;
      border: 1px solid #1a2535;
      padding: 8px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      color: #aaa;
    }

    .checkbox-item input { width: auto; }
    .checkbox-item.checked {
      border-color: #1a73e8;
      color: #1a73e8;
      background: #0a1628;
    }

    .generate-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      letter-spacing: 1px;
    }

    .generate-btn:disabled { background: #1a2535; color: #555; }

    /* AQI Input */
    .aqi-row {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    .aqi-row input { flex: 1; }
    .aqi-row button {
      padding: 12px 18px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }

    /* Results */
    .result-section {
      background: #0d1117;
      margin: 20px;
      border-radius: 15px;
      padding: 25px;
      border: 1px solid #1a73e8;
      display: none;
    }

    .result-section h2 { color: #1a73e8; margin-bottom: 5px; }
    .result-subtitle { color: #888; font-size: 13px; margin-bottom: 20px; }

    .plan-card {
      background: #0a0e1a;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 12px;
      border-left: 3px solid #1a73e8;
    }

    .plan-card.warning { border-left-color: #ff9800; }
    .plan-card.danger  { border-left-color: #f44336; }
    .plan-card.good    { border-left-color: #34a853; }

    .plan-card h3 {
      font-size: 14px;
      color: #1a73e8;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .plan-card.warning h3 { color: #ff9800; }
    .plan-card.danger h3  { color: #f44336; }
    .plan-card.good h3    { color: #34a853; }

    .plan-card p {
      font-size: 14px;
      color: #ccc;
      line-height: 1.6;
    }

    .highlight-text {
      color: #1a73e8;
      font-weight: bold;
    }

    .aqi-badge {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 15px;
    }

    .loading-msg {
      text-align: center;
      color: #1a73e8;
      padding: 20px;
      font-size: 14px;
    }

    .blink {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    footer {
      background: #0d1117;
      color: #555;
      text-align: center;
      padding: 20px;
      margin-top: 20px;
      border-top: 1px solid #1a2535;
      font-size: 13px;
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">🌬️ AirSafe City</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="map.html">AQI Pulse</a>
    <a href="healthplan.html">Health Plan</a>
    <a href="report.html">Report</a>
  </div>
</nav>

<div class="page-header">
  <span class="highlight-badge">⚡ AI Powered</span>
  <h1>💊 Personal Health Plan</h1>
  <p>Get a personalized air quality health plan based on your profile</p>
</div>

<!-- FORM SECTION -->
<div class="section">
  <h2>👤 Your Health Profile</h2>

  <div class="form-group">
    <label>📍 Your City</label>
    <div class="aqi-row">
      <input type="text" id="cityInput" placeholder="eg: Delhi, Mumbai, Bengaluru">
      <button onclick="fetchAQI()">🔍 Get AQI</button>
    </div>
    <div id="aqiDisplay" style="font-size:13px;color:#888;margin-top:5px"></div>
  </div>

  <div class="form-group">
    <label>🎂 Age Group</label>
    <select id="ageGroup">
      <option value="">Select age group...</option>
      <option value="child">👶 Child (0-12 years)</option>
      <option value="teen">🧑 Teen (13-17 years)</option>
      <option value="adult">👨 Adult (18-45 years)</option>
      <option value="senior">👴 Senior (46-60 years)</option>
      <option value="elderly">🧓 Elderly (60+ years)</option>
    </select>
  </div>

  <div class="form-group">
    <label>🏃 Activity Level</label>
    <select id="activityLevel">
      <option value="">Select activity level...</option>
      <option value="sedentary">🛋️ Sedentary (mostly indoors)</option>
      <option value="light">🚶 Light (occasional walks)</option>
      <option value="moderate">🏃 Moderate (regular exercise)</option>
      <option value="active">💪 Very Active (outdoor sports/work)</option>
    </select>
  </div>

  <div class="form-group">
    <label>🏥 Health Conditions (select all that apply)</label>
    <div class="checkbox-group" id="conditionGroup">
      <label class="checkbox-item" onclick="toggleCheck(this)">
        <input type="checkbox" value="asthma"> 🫁 Asthma
      </label>
      <label class="checkbox-item" onclick="toggleCheck(this)">
        <input type="checkbox" value="heart"> ❤️ Heart Disease
      </label>
      <label class="checkbox-item" onclick="toggleCheck(this)">
        <input type="checkbox" value="diabetes"> 🩸 Diabetes
      </label>
      <label class="checkbox-item" onclick="toggleCheck(this)">
        <input type="checkbox" value="allergies"> 🤧 Allergies
      </label>
      <label class="checkbox-item" onclick="toggleCheck(this)">
        <input type="checkbox" value="copd"> 😮‍💨 COPD
      </label>
      <label class="checkbox-item" onclick="toggleCheck(this)">
        <input type="checkbox" value="pregnant"> 🤰 Pregnant
      </label>
      <label class="checkbox-item" onclick="toggleCheck(this)">
        <input type="checkbox" value="none"> ✅ None
      </label>
    </div>
  </div>

  <button class="generate-btn" id="generateBtn" onclick="generatePlan()">
    ⚡ Generate My Health Plan
  </button>
</div>

<!-- RESULT SECTION -->
<div class="result-section" id="resultSection">
  <h2>📋 Your Personal Health Plan</h2>
  <p class="result-subtitle" id="resultSubtitle"></p>
  <div id="planContent"></div>
</div>

<footer>
  © 2026 AirSafe City | Team Vertex Systems | WitchHunt Hackathon
</footer>

<script>
  const waqiToken = "c57409aae7cb03d5edd97a5fcb3cc3206320b162";
  const BASE_URL = window.location.hostname.includes('github.io') ? 'https://airsafe-city.vercel.app' : '';
  let currentAQI = null;
  let currentCity = null;

  function toggleCheck(el) {
    el.classList.toggle("checked");
  }

  async function fetchAQI() {
    const city = document.getElementById("cityInput").value.trim();
    if (!city) { alert("Please enter a city!"); return; }

    document.getElementById("aqiDisplay").innerHTML = "⏳ Fetching AQI...";

    try {
      const res = await fetch("https://api.waqi.info/feed/" + city + "/?token=" + waqiToken);
      const data = await res.json();

      if (data.status === "ok") {
        currentAQI = data.data.aqi;
        currentCity = data.data.city.name;

        let label, color;
        if (currentAQI <= 50)       { label = "Good 😊";               color = "#34a853"; }
        else if (currentAQI <= 100) { label = "Moderate 😐";           color = "#fbbc04"; }
        else if (currentAQI <= 150) { label = "Unhealthy for Some 😷"; color = "#ff9800"; }
        else if (currentAQI <= 200) { label = "Unhealthy 🤧";          color = "#f44336"; }
        else if (currentAQI <= 300) { label = "Very Unhealthy 😰";     color = "#9c27b0"; }
        else                        { label = "Hazardous ☠️";          color = "#7d0023"; }

        document.getElementById("aqiDisplay").innerHTML =
          "✅ <span style='color:" + color + ";font-weight:bold'>" + currentCity + " — AQI " + currentAQI + " (" + label + ")</span>";
      } else {
        document.getElementById("aqiDisplay").innerHTML = "❌ City not found. Try Delhi, Mumbai, Bengaluru";
      }
    } catch(e) {
      document.getElementById("aqiDisplay").innerHTML = "❌ Error fetching AQI";
    }
  }

  function getConditions() {
    return Array.from(document.querySelectorAll(".checkbox-item.checked input"))
      .map(cb => cb.value);
  }

  // Smart fallback plan generator
  function getSmartPlan(aqi, city, age, activity, conditions) {
    const isVulnerable = conditions.some(c => ["asthma","heart","copd","pregnant"].includes(c));
    const isChild = age === "child";
    const isElderly = age === "elderly" || age === "senior";
    const isActive = activity === "active" || activity === "moderate";

    let plans = [];

    // AQI Status card
    let aqiColor = aqi <= 50 ? "good" : aqi <= 100 ? "" : aqi <= 150 ? "warning" : "danger";
    let aqiMsg = aqi <= 50 ? "Air quality is excellent today!" :
                 aqi <= 100 ? "Air quality is acceptable for most people." :
                 aqi <= 150 ? "Air quality is concerning for sensitive groups." :
                 "Air quality is unhealthy. Take precautions!";

    plans.push({ type: aqiColor, title: "🌬️ Current Air Quality — " + city, content: "<span class='highlight-text'>AQI: " + aqi + "</span> — " + aqiMsg });

    // Outdoor activity advice
    if (aqi <= 50) {
      plans.push({ type: "good", title: "🏃 Outdoor Activity", content: "Great day for outdoor activities! You can exercise freely outside. " + (isActive ? "Perfect conditions for your active lifestyle." : "Consider a walk or light jog today.") });
    } else if (aqi <= 100) {
      plans.push({ type: "", title: "🏃 Outdoor Activity", content: isVulnerable ? "⚠️ Limit outdoor time to under 30 minutes. Carry your inhaler/medication." : "Outdoor activity is fine but take breaks. Avoid prolonged exercise during peak hours (8-10am, 5-7pm)." });
    } else if (aqi <= 150) {
      plans.push({ type: "warning", title: "🏃 Outdoor Activity", content: (isChild || isElderly || isVulnerable) ? "🚨 Stay indoors. AQI is dangerous for your profile. Do light indoor exercises instead." : "Reduce outdoor time. Wear N95 mask if going out. Avoid heavy exercise outside." });
    } else {
      plans.push({ type: "danger", title: "🏃 Outdoor Activity", content: "🚨 AVOID all outdoor activity. AQI is at unhealthy levels. Exercise indoors only — yoga, stretching, or indoor gym." });
    }

    // Mask advice
    plans.push({
      type: aqi > 100 ? "warning" : "good",
      title: "😷 Mask Recommendation",
      content: aqi <= 50 ? "No mask needed today. Air is clean!" :
                aqi <= 100 ? (isVulnerable ? "Wear N95 mask outdoors as a precaution." : "Surgical mask is sufficient for short trips.") :
                "Wear <span class='highlight-text'>N95 or N99 mask</span> whenever going outside. Replace every 8 hours."
    });

    // Condition-specific advice
    if (conditions.includes("asthma")) {
      plans.push({ type: aqi > 100 ? "danger" : "warning", title: "🫁 Asthma Alert", content: aqi > 100 ? "🚨 High risk! Keep rescue inhaler nearby. Avoid ALL outdoor exposure. Take preventive medication as prescribed." : "Keep your inhaler accessible. Monitor breathing. Avoid dusty areas and vehicle exhaust." });
    }

    if (conditions.includes("heart")) {
      plans.push({ type: "warning", title: "❤️ Heart Health", content: "Air pollution stresses the cardiovascular system. Avoid physical exertion in polluted air. " + (aqi > 150 ? "🚨 Stay indoors — high AQI increases heart attack risk." : "Limit outdoor time and monitor for chest pain.") });
    }

    if (conditions.includes("pregnant")) {
      plans.push({ type: "danger", title: "🤰 Pregnancy Alert", content: "Pollution exposure affects fetal development. " + (aqi > 100 ? "🚨 Stay indoors as much as possible. Use air purifier at home." : "Limit outdoor time, especially near traffic. Wear N95 when outside.") });
    }

    if (isChild) {
      plans.push({ type: aqi > 100 ? "danger" : "warning", title: "👶 Child Safety", content: aqi > 100 ? "🚨 Keep children indoors. Cancel outdoor play. Schools should avoid outdoor activities." : "Limit children's outdoor playtime to mornings. Avoid roadside areas." });
    }

    // Hydration
    plans.push({ type: "good", title: "💧 Hydration & Diet", content: "Drink <span class='highlight-text'>8-10 glasses of water</span> daily to help flush pollutants. Eat antioxidant-rich foods: <span class='highlight-text'>turmeric, ginger, amla, green tea</span>. These help reduce inflammation caused by pollution." });

    // Indoor advice
    if (aqi > 100) {
      plans.push({ type: "warning", title: "🏠 Indoor Safety", content: "Keep windows closed during peak hours. Use <span class='highlight-text'>indoor plants</span> like Aloe Vera, Spider Plant, Peace Lily to improve air quality. If available, run an air purifier." });
    }

    // Time of day
    plans.push({ type: "", title: "⏰ Best Time to Go Outside", content: aqi <= 100 ? "Morning (6-9 AM) and evening (6-8 PM) are best. Avoid 10 AM-4 PM when traffic and temperature peak." : "If you must go out, choose <span class='highlight-text'>early morning (5-7 AM)</span> when pollution is lowest. Return before traffic builds up." });

    return plans;
  }

  async function generatePlan() {
    const age = document.getElementById("ageGroup").value;
    const activity = document.getElementById("activityLevel").value;
    const conditions = getConditions();

    if (!currentAQI) { alert("Please fetch AQI for your city first!"); return; }
    if (!age) { alert("Please select your age group!"); return; }
    if (!activity) { alert("Please select your activity level!"); return; }

    const btn = document.getElementById("generateBtn");
    btn.disabled = true;
    btn.innerText = "⚡ Generating your plan...";

    document.getElementById("resultSection").style.display = "block";
    document.getElementById("resultSubtitle").innerText = currentCity + " • AQI " + currentAQI + " • " + age + " • " + activity;
    document.getElementById("planContent").innerHTML = "<div class='loading-msg'><span class='blink'>⚡ Vaayu AI is building your personal health plan...</span></div>";

    // Try AI first
    try {
      const prompt = "You are Vaayu AI health advisor. Create a personalized air quality health plan. Profile: City=" + currentCity + ", AQI=" + currentAQI + ", Age=" + age + ", Activity=" + activity + ", Conditions=" + (conditions.join(", ") || "none") + ". Give 6 specific health tips. Each tip: start with emoji, bold the most important action word, keep under 20 words. Format as plain lines only.";

      const res = await fetch(BASE_URL + "/api/gemini", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt })
      });

      const data = await res.json();

      if (data.reply) {
        const tips = data.reply.trim().split("\n").filter(l => l.trim());
        document.getElementById("planContent").innerHTML =
          tips.map(tip => "<div class='plan-card'><p>" + tip + "</p></div>").join("") +
          "<div class='plan-card good'><h3>💧 Hydration & Diet</h3><p>Drink <span class='highlight-text'>8-10 glasses of water</span> daily. Eat turmeric, ginger, amla to fight pollution effects.</p></div>";
        btn.disabled = false;
        btn.innerText = "⚡ Generate My Health Plan";
        return;
      }
    } catch(e) {}

    // Smart fallback
    setTimeout(() => {
      const plans = getSmartPlan(currentAQI, currentCity, age, activity, conditions);
      document.getElementById("planContent").innerHTML = plans.map(p =>
        "<div class='plan-card " + p.type + "'><h3>" + p.title + "</h3><p>" + p.content + "</p></div>"
      ).join("");
      btn.disabled = false;
      btn.innerText = "⚡ Generate My Health Plan";
    }, 1500);
  }
</script>
</body>
</html>
